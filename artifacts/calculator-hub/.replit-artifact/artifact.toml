kind = "web"
previewPath = "/"
title = "Calculator Hub"
version = "1.0.0"
id = "artifacts/calculator-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20771

[services.development]
run = "pnpm --filter @workspace/calculator-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculator-hub", "run", "build" ]
publicDir = "artifacts/calculator-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20771"
BASE_PATH = "/"
